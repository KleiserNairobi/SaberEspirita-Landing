<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Saber Espírita | Seu Aplicativo para Estudo da Doutrina Espírita
    </title>
    <link rel="icon" type="image/png" href="assets/logo512.png" />
    <meta
      name="description"
      content="O Saber Espírita é o aplicativo completo para o estudo da Doutrina Espírita. Estude as obras de Allan Kardec, medite e fortaleça sua fé diariamente."
    />
    <link rel="canonical" href="https://saberespirita.app.br/" />

    <!-- Open Graph / Meta, WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://saberespirita.app.br/" />
    <meta
      property="og:title"
      content="Saber Espírita | Aplicativo da Doutrina Espírita"

    <meta
      property="og:description"
      content="Estudo da obra Kardecista, fixação, reflexão, meditação guiada e preces."

    <script type="application/ld+json">

        "@context": "https://schema.org",

        "description": "Aplicativo educacional destinado ao aprofundamento filosófico, estruturado nas bases da Doutrina Espírita codificada por Allan Kardec.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "BRL"

      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sage: {
                50: "#F2F7F2",
                100: "#D9E4CC",
                200: "#839278",
                300: "#6F7C60",
                400: "#565551",
                500: "#222222",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "vine-grow": "vineGrow 2s ease-out forwards",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-20px)" },
              },
              vineGrow: {
                "0%": { strokeDashoffset: "1000" },
                "100%": { strokeDashoffset: "0" },
              },
            },
          },
        },
      };
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        background-color: #f2f7f2;
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }

      .text-gradient {
        background: linear-gradient(135deg, #6f7c60 0%, #839278 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .glow-golden {
        background: radial-gradient(
          circle at 70% 30%,
          rgba(255, 215, 100, 0.2) 0%,
          transparent 50%
        );
      }

      .glow-blue {
        background: radial-gradient(
          circle at 30% 70%,
          rgba(100, 120, 140, 0.15) 0%,
          transparent 50%
        );
      }

      .vine-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10,30 Q20,20 30,30 T50,30' fill='none' stroke='%23839278' stroke-width='0.5' opacity='0.2'/%3E%3C/svg%3E");
      }

      .phone-mockup {
        box-shadow:
          0 0 0 12px #ffffff,
          0 25px 50px -12px rgba(0, 0, 0, 0.25),
          0 0 0 1px rgba(0, 0, 0, 0.1);
        border-radius: 40px;
        position: relative;
        overflow: hidden;
      }

      .phone-notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 25px;
        background: #ffffff;
        border-bottom-left-radius: 16px;
        border-bottom-right-radius: 16px;
        z-index: 10;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(131, 146, 120, 0.2);
      }

      .smooth-scroll {
        scroll-behavior: smooth;
      }

      .btn-primary {
        background-color: #6f7c60;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        background-color: #5a6550;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(111, 124, 96, 0.4);
      }

      .feature-icon {
        background: linear-gradient(135deg, #d9e4cc 0%, #839278 100%);
      }

      .section-fade {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s ease-out,
          transform 0.8s ease-out;
      }

      .section-fade.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="antialiased text-sage-500">
    <div id="root"></div>

    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // Vine Branch SVG Component
      const VineBranch = ({ className = "", color = "#839278" }) => (
        <svg
          className={className}
          viewBox="0 0 800 120"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g
            stroke={color}
            strokeWidth="1.5"
            strokeLinecap="round"
            strokeLinejoin="round"
            opacity="0.6"
          >
            {/* Haste principal */}
            <path
              d="M-20,60 Q 50,20 120,60 T 260,60 T 400,60 T 540,60 T 680,60 T 820,60"
              fill="none"
            />

            {/* Folha 1 (Esquerda) */}
            <g transform="translate(180, 60) scale(0.8)">
              <path
                d="M0,0 Q -10,15 -5,30 Q -15,25 -25,35 Q -20,15 -35,5 Q -20,0 -25,-15 Q -10,-5 0,0"
                fill="none"
              />
              <path d="M0,0 L -15,12" />
            </g>

            {/* Folha 2 (Centro) */}
            <g transform="translate(420, 50) scale(1)">
              <path
                d="M0,0 Q -10,-20 0,-40 Q 15,-25 30,-35 Q 20,-15 35,-5 Q 15,0 20,20 Q 5,10 0,0"
                fill="none"
              />
              <path d="M0,0 L 15,-15" />
            </g>

            {/* Gavinha espiral (Centro direita) */}
            <path d="M470,55 Q 490,20 500,40 T 490,60 T 510,50" fill="none" />

            {/* Folha 3 (Direita acoplada ao cacho) */}
            <g transform="translate(620, 55) scale(0.9)">
              <path
                d="M0,0 Q -15,-20 -5,-40 Q 10,-20 25,-30 Q 15,-10 30,5 Q 10,0 15,20 Q 0,10 0,0"
                fill="none"
              />
              <path d="M0,0 L 12,-12M4,-6 L -2,-12 M 8,-1 L 18,2" />
            </g>

            {/* Cacho de Uvas Central */}
            <g transform="translate(560, 65)">
              <path d="M0,0 L 5,10" fill="none" />
              <circle cx="2" cy="12" r="3" /> <circle cx="8" cy="12" r="3" />
              <circle cx="5" cy="16" r="3" /> <circle cx="11" cy="16" r="3" />{" "}
              <circle cx="-1" cy="16" r="3" />
              <circle cx="2" cy="21" r="3" /> <circle cx="8" cy="21" r="3" />{" "}
              <circle cx="14" cy="21" r="3" />
              <circle cx="5" cy="26" r="3" /> <circle cx="11" cy="26" r="3" />
              <circle cx="8" cy="31" r="3" />
            </g>

            {/* Gavinha espiral final (Extrema direita) */}
            <path d="M720,65 Q 750,90 760,70 T 750,50 T 770,60" fill="none" />
          </g>
        </svg>
      );

      // Vine Background Pattern
      const VineWatermark = () => (
        <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-[0.03]">
          <svg
            className="w-full h-full"
            viewBox="0 0 100 100"
            preserveAspectRatio="none"
          >
            <path
              d="M0,50 Q25,30 50,50 T100,50"
              stroke="#6F7C60"
              strokeWidth="0.5"
              fill="none"
            />
            <path
              d="M0,60 Q25,40 50,60 T100,60"
              stroke="#6F7C60"
              strokeWidth="0.5"
              fill="none"
            />
            <path
              d="M0,40 Q25,20 50,40 T100,40"
              stroke="#6F7C60"
              strokeWidth="0.5"
              fill="none"
            />
          </svg>
        </div>
      );

      // Phone Mockup Component
      const PhoneMockup = () => (
        <div className="phone-mockup w-72 h-[580px] bg-white mx-auto animate-float relative">
          <div className="phone-notch"></div>
          <div className="phone-screen relative flex items-center justify-center bg-sage-50 overflow-hidden">
            <div className="absolute top-0 inset-x-0 h-4 bg-white/20 backdrop-blur-md z-20"></div>
            <div className="w-full h-full">
              <img
                src="assets/home.png"
                alt="Captura de tela do aplicativo Saber Espírita focado no estudo da Doutrina Espírita"
                className="w-full h-full object-cover"
              />
            </div>
          </div>
        </div>
      );

      // Scroll Animation Hook
      const useScrollAnimation = () => {
        const ref = useRef(null);
        const [isVisible, setIsVisible] = useState(false);

        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setIsVisible(true);
              }
            },
            { threshold: 0.1 },
          );

          if (ref.current) {
            observer.observe(ref.current);
          }

          return () => observer.disconnect();
        }, []);

        return [ref, isVisible];
      };

      // Global Navigation Helper
      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: "smooth" });
        }
      };

      // Navigation Component
      const Navigation = () => {
        const [isScrolled, setIsScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => setIsScrolled(window.scrollY > 50);
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        return (
          <nav
            className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? "bg-white/90 backdrop-blur-md shadow-sm py-3" : "bg-transparent py-6"}`}
          >
            <div className="container mx-auto px-4 flex items-center justify-between">
              <div
                className="flex items-center gap-2 cursor-pointer"
                onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
              >
                <div className="w-8 h-8 flex items-center justify-center">
                  <img
                    src="assets/logo.png"
                    alt="Logotipo do Saber Espírita - Aplicativo de Estudos"
                    className="w-full h-full object-contain"
                  />
                </div>
                <span className="font-serif text-xl font-bold text-sage-500">
                  Saber Espírita
                </span>
              </div>
              <div className="hidden md:flex items-center gap-8 text-sm text-sage-400">
                <a
                  href="#desafios"
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("desafios");
                  }}
                  className="hover:text-sage-500 transition-colors cursor-pointer"
                >
                  Desafios
                </a>
                <a
                  href="#metodo"
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("metodo");
                  }}
                  className="hover:text-sage-500 transition-colors cursor-pointer"
                >
                  Método
                </a>
                <a
                  href="#ia"
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("ia");
                  }}
                  className="hover:text-sage-500 transition-colors cursor-pointer"
                >
                  IA
                </a>
                <a
                  href="#experiencia"
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("experiencia");
                  }}
                  className="hover:text-sage-500 transition-colors cursor-pointer"
                >
                  Recursos
                </a>
                <a
                  href="#depoimentos"
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("depoimentos");
                  }}
                  className="hover:text-sage-500 transition-colors cursor-pointer"
                >
                  Depoimentos
                </a>
              </div>
              <button
                type="button"
                onClick={(e) => {
                  e.preventDefault();
                  scrollToSection("download");
                }}
                className="btn-primary relative z-50 text-white p-2 sm:px-6 sm:py-2 rounded-full text-sm font-medium flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:h-auto cursor-pointer"
                aria-label="Baixar App"
              >
                <i
                  data-lucide="download"
                  className="w-5 h-5 sm:w-4 sm:h-4 pointer-events-none"
                ></i>
                <span className="hidden sm:inline pointer-events-none">
                  Baixar App
                </span>
              </button>
            </div>
          </nav>
        );
      };

      // Hero Section
      const Hero = () => {
        const [ref, isVisible] = useScrollAnimation();

        return (
          <section
            className="relative min-h-screen pt-32 pb-20 overflow-hidden glow-golden glow-blue"
            id="inicio"
          >
            <VineWatermark />

            <div className="container mx-auto px-4 relative z-10">
              <div className="grid lg:grid-cols-2 gap-12 items-center">
                <div
                  ref={ref}
                  className={`space-y-8 transition-all duration-1000 ${isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-8"}`}
                >
                  <div className="inline-flex items-center gap-3 text-xs font-medium text-sage-400 bg-white border border-sage-100 shadow-sm p-1.5 pr-5 rounded-full">
                    <div className="flex -space-x-2">
                      <img
                        src="https://randomuser.me/api/portraits/women/44.jpg"
                        alt="Foto de usuária estudante da Doutrina Espírita"
                        className="w-8 h-8 rounded-full border-2 border-white object-cover"
                      />
                      <img
                        src="https://randomuser.me/api/portraits/men/32.jpg"
                        alt="Foto de usuário estudando o Espiritismo"
                        className="w-8 h-8 rounded-full border-2 border-white object-cover"
                      />
                      <img
                        src="https://randomuser.me/api/portraits/women/68.jpg"
                        alt="Foto de usuária do aplicativo Saber Espírita"
                        className="w-8 h-8 rounded-full border-2 border-white object-cover"
                      />
                    </div>
                    <p>Faça parte da nossa comunidade</p>
                  </div>

                  <h1 className="font-serif text-4xl md:text-5xl lg:text-6xl font-bold text-sage-500 leading-tight">
                    Saber Espírita: <br className="hidden md:block" />
                    <span className="text-gradient italic">
                      O ecossistema digital que transforma estudo em evolução
                      espiritual.
                    </span>
                  </h1>

                  <p className="text-lg md:text-xl text-sage-400 max-w-lg leading-relaxed">
                    Estude, Fixe, Medite e Ore em um único ecossistema digital.
                    Viva o Espiritismo todos os dias.
                  </p>

                  <div className="flex flex-col sm:flex-row gap-4 relative z-10">
                    <a
                      href="https://apps.apple.com/br/app/saber-esp%C3%ADrita/id6751443526"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center justify-center gap-3 bg-sage-500 text-white px-6 py-4 rounded-2xl font-semibold hover:bg-sage-400 transition-all hover:scale-105 shadow-lg shadow-sage-300/30"
                    >
                      <i data-lucide="apple" className="w-6 h-6"></i>
                      <div className="text-left">
                        <div className="text-[10px] opacity-80">Baixar na</div>
                        <div className="text-sm font-bold">App Store</div>
                        <div className="text-[9px] opacity-70 mt-0.5 font-normal">
                          Baixe gratuitamente
                        </div>
                      </div>
                    </a>

                    <a
                      href="https://play.google.com/store/apps/details?id=app.saberespirita"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center justify-center gap-3 bg-white text-sage-500 border-2 border-sage-100 px-6 py-4 rounded-2xl font-semibold hover:border-sage-300 transition-all hover:scale-105"
                    >
                      <i
                        data-lucide="play"
                        className="w-6 h-6 text-sage-300"
                      ></i>
                      <div className="text-left">
                        <div className="text-[10px] text-sage-400">
                          Baixar no
                        </div>
                        <div className="text-sm font-bold">Google Play</div>
                        <div className="text-[9px] text-sage-400 mt-0.5 font-normal">
                          Baixe gratuitamente
                        </div>
                      </div>
                    </a>
                  </div>
                </div>

                <div className="relative">
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-sage-100/50 rounded-full blur-3xl animate-pulse-slow"></div>
                  <div className="relative z-10">
                    <PhoneMockup />
                  </div>

                  {/* Floating elements */}
                  {/* Estude (Livro) - Topo Esquerda */}
                  <div
                    className="absolute top-16 -left-6 lg:-left-12 glass-card p-3 rounded-xl animate-float"
                    style={{ animationDelay: "0s" }}
                    title="Estude"
                  >
                    <i
                      data-lucide="book-open"
                      className="w-5 h-5 text-sage-300"
                    ></i>
                  </div>

                  {/* Fixe (Cérebro/Quiz) - Base Esquerda */}
                  <div
                    className="absolute bottom-32 -left-4 lg:-left-8 glass-card p-3 rounded-xl animate-float"
                    style={{ animationDelay: "1.5s" }}
                    title="Fixe"
                  >
                    <i
                      data-lucide="brain"
                      className="w-5 h-5 text-sage-300"
                    ></i>
                  </div>

                  {/* Medite (Folha/Serenidade) - Topo Direita */}
                  <div
                    className="absolute top-24 -right-4 lg:-right-8 glass-card p-3 rounded-xl animate-float"
                    style={{ animationDelay: "1s" }}
                    title="Medite"
                  >
                    <i data-lucide="leaf" className="w-5 h-5 text-sage-300"></i>
                  </div>

                  {/* Ore (Coração/Fé) - Base Direita */}
                  <div
                    className="absolute bottom-20 -right-6 lg:-right-12 glass-card p-3 rounded-xl animate-float"
                    style={{ animationDelay: "2.5s" }}
                    title="Ore"
                  >
                    <i
                      data-lucide="heart"
                      className="w-5 h-5 text-sage-300"
                    ></i>
                  </div>
                </div>
              </div>
            </div>

            <VineBranch className="absolute bottom-4 left-0 right-0 w-full z-0 pointer-events-none" />
          </section>
        );
      };

      // Pain Points Section
      const PainPoints = () => {
        const [ref, isVisible] = useScrollAnimation();

        const pains = [
          {
            icon: "calendar-clock",
            title: "Falta de constância",
            desc: "A rotina corrida dificulta manter o ritmo de estudos.",
          },
          {
            icon: "repeat",
            title: "Dificuldade em revisar",
            desc: "Como fixar o que foi aprendido de forma eficaz?",
          },
          {
            icon: "hourglass",
            title: "Pouco tempo",
            desc: "A paz interior parece um luxo distante no dia a dia.",
          },
          {
            icon: "smartphone",
            title: "Distrações digitais",
            desc: "O ambiente online nem sempre favorece a concentração.",
          },
        ];

        return (
          <section className="py-20 bg-white relative" id="desafios">
            <div className="container mx-auto px-4">
              <div
                ref={ref}
                className={`text-center max-w-3xl mx-auto mb-16 transition-all duration-1000 ${isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-8"}`}
              >
                <h2 className="font-serif text-3xl md:text-4xl font-bold text-sage-500 mb-6">
                  Você quer estudar mais a Doutrina Espírita… mas falta{" "}
                  <span className="italic text-sage-300">organização</span>?
                </h2>
                <p className="text-sage-400 leading-relaxed">
                  Sabemos que a jornada espiritual é profunda e exige dedicação.
                  Mas, no dia a dia, é comum enfrentar desafios que impedem seu
                  crescimento.
                </p>
              </div>

              <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                {pains.map((pain, idx) => (
                  <div
                    key={idx}
                    className="glass-card p-6 rounded-2xl hover:shadow-lg transition-all hover:-translate-y-1 group"
                  >
                    <div className="w-12 h-12 rounded-xl bg-sage-50 flex items-center justify-center mb-4 group-hover:bg-sage-300 transition-colors">
                      <i
                        data-lucide={pain.icon}
                        className="w-6 h-6 text-sage-300 group-hover:text-white transition-colors"
                      ></i>
                    </div>
                    <h3 className="font-serif text-lg font-semibold text-sage-500 mb-2">
                      {pain.title}
                    </h3>
                    <p className="text-sm text-sage-400 leading-relaxed">
                      {pain.desc}
                    </p>
                  </div>
                ))}
              </div>

              <div className="mt-12 text-center">
                <p className="text-sage-400 italic">
                  Se você se identificou, o Saber Espírita foi feito para você.
                  É hora de transformar esses desafios em oportunidades de
                  crescimento.
                </p>
              </div>
            </div>
          </section>
        );
      };

      // Features Section (The Method)
      const Features = () => {
        const [ref, isVisible] = useScrollAnimation();

        const features = [
          {
            icon: "book-open",
            title: "Estude",
            subtitle: "Trilhas de Aprendizado Estruturado e Fiel",
            desc: "Acesse cursos completos e módulos didáticos exclusivos sobre a Doutrina Espírita, desenvolvidos com rigor e fidelidade à Codificação. Aprenda no seu próprio ritmo, com uma jornada clara que acolhe desde o iniciante curioso até o estudioso avançado.",
            color: "bg-sage-300",
          },
          {
            icon: "brain",

                  </ul>
                </div>
              </div>

              <div className="border-t border-sage-200 pt-8 flex flex-col md:flex-row items-center justify-between gap-4 text-center md:text-left">
                <p className="text-sage-400 text-sm font-serif italic">
                  "Saber Espírita — Iluminando mentes, confortando corações."
                </p>
                <p className="text-sage-400 text-xs">
                  © 2025 Saber Espírita. Todos os direitos reservados.
                </p>
              </div>
            </div>
          </footer>
        );
      };

      // Main App Component
      const App = () => {
        useEffect(() => {
          // Initialize Lucide icons
          if (window.lucide) {
            window.lucide.createIcons();
          }

          // Re-run Lucide icons after React render
          const interval = setInterval(() => {
            if (window.lucide) {
              window.lucide.createIcons();
            }
          }, 100);

          return () => clearInterval(interval);
        }, []);

        return (
          <div className="smooth-scroll">
            <Navigation />
            <Hero />
            <PainPoints />
            <Features />
            <AIChatbots />
            <AppExperience />
            <Testimonials />
            <Footer />
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
